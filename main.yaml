name: Daily Vocab Bot
on:
  schedule:
    - cron: '0 0,5,10,14 * * *' # 7h, 12h, 17h, 21h VN
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install
        run: pip install pandas requests
      - name: Run
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
      - name: Save State
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Update state [skip ci]"
          file_pattern: state.json
